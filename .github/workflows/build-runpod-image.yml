name: Build RunPod image

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "common/**"
      - "providers/runpod/**"
      - ".github/workflows/build-runpod-image.yml"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  # OCI image names must be lowercase; the GitHub account is Anelessar.
  IMAGE_NAME: anelessar/comfyui-cloud

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate installers and profiles
        run: |
          python -m unittest discover -s tests -v
          python -m py_compile common/install_from_config.py
          for file in common/*.sh providers/vastai/*.sh providers/runpod/*.sh; do
            bash -n "$file"
          done
          find configs -type f -name '*.json' -print0 | while IFS= read -r -d '' file; do
            python -m json.tool "$file" >/dev/null
            python common/install_from_config.py \
              --config "$file" \
              --comfy-dir /workspace/ComfyUI \
              --validate-only
          done
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: providers/runpod/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:0.2.0
